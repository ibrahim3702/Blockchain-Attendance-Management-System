services:
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - bams-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/bams
      - PORT=4000
    networks:
      - bams-network
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=bams
    volumes:
      - mongo_data:/data/db
    networks:
      - bams-network
    restart: unless-stopped

volumes:
  mongo_data:


networks:
  bams-network:
    driver: bridge
